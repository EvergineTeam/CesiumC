name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_TYPE: Release
  # Release-only dependency builds: these overlay triplets override the built-in
  # ones (same names) and set VCPKG_BUILD_TYPE=release, so vcpkg skips Debug.
  VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/triplets
  # VCPKG_BINARY_SOURCES is set per-run in the "Configure vcpkg binary cache"
  # step below: readwrite on main (to warm the cache), read-only elsewhere.

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            arch: x64
            triplet: x64-windows
            generator: "Visual Studio 17 2022"
            cmake-arch: "-A x64"
            artifact: windows-x64
            bin-path: build/bin/Release/*.dll
            lib-path: build/lib/Release/CesiumNativeC.*
            skip-tests: false

          - os: windows-2022
            arch: arm64
            triplet: arm64-windows
            generator: "Visual Studio 17 2022"
            cmake-arch: "-A ARM64"
            artifact: windows-arm64
            bin-path: build/bin/Release/*.dll
            lib-path: build/lib/Release/CesiumNativeC.*
            skip-tests: true  # cross-compiled, can't run on x64

          # - os: ubuntu-latest
          #   arch: x64
          #   triplet: x64-linux
          #   generator: Ninja
          #   cmake-arch: ""
          #   artifact: linux-x64
          #   bin-path: build/bin/
          #   lib-path: build/lib/libCesiumNativeC.*
          #   skip-tests: false

          # - os: ubuntu-24.04-arm
          #   arch: arm64
          #   triplet: arm64-linux
          #   generator: Ninja
          #   cmake-arch: ""
          #   artifact: linux-arm64
          #   bin-path: build/bin/
          #   lib-path: build/lib/libCesiumNativeC.*
          #   skip-tests: false

          - os: macos-14
            arch: arm64
            triplet: arm64-osx
            generator: Ninja
            cmake-arch: ""
            artifact: osx-arm64
            bin-path: build/bin/
            lib-path: build/lib/libCesiumNativeC.*
            skip-tests: false

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.artifact }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # ---- vcpkg binary caching ----

      - name: Configure vcpkg binary cache
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
            // Per-package cache backed by the GitHub Actions cache service.
            // Only warm (write) the cache from main; PRs read it but never write,
            // so they can't evict shared entries and fork PRs don't fail on write.
            const writable = context.ref === 'refs/heads/main';
            core.exportVariable('VCPKG_BINARY_SOURCES', `clear;x-gha,${writable ? 'readwrite' : 'read'}`);

      # ---- Install platform tools ----

      - name: Install tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build nasm pkg-config

      - name: Install tools (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja nasm

      # ---- vcpkg ----

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 62159a45e18f3a9ac0548628dcaf74fcb60c6ff9

      # ---- Build ----

      - name: CMake configure
        run: >
          cmake -S . -B build
          -G "${{ matrix.generator }}" ${{ matrix.cmake-arch }}
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
          -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}

      - name: CMake build
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --parallel

      # ---- Test ----

      - name: Run tests
        if: ${{ !matrix.skip-tests }}
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --target CesiumNativeCTests --parallel && ctest --test-dir build --build-config ${{ env.CMAKE_BUILD_TYPE }} --output-on-failure --no-tests=error
        env:
          # Offline tests only in CI — no Ion token
          CESIUM_ION_TOKEN: ""

      # ---- Upload ----

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CesiumNativeC-${{ matrix.artifact }}
          path: |
            ${{ matrix.bin-path }}
            ${{ matrix.lib-path }}
          if-no-files-found: error
