name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN needs packages:write to push to the GitHub Packages NuGet feed
# used as the vcpkg binary cache. On pull requests from forks this is
# automatically downgraded to read-only.
permissions:
  contents: read
  packages: write

env:
  CMAKE_BUILD_TYPE: Release
  # Release-only dependency builds: these overlay triplets override the built-in
  # ones (same names) and set VCPKG_BUILD_TYPE=release, so vcpkg skips Debug.
  VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/triplets
  # GitHub Packages NuGet feed used as the vcpkg binary cache (owner-scoped).
  NUGET_FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            arch: x64
            triplet: x64-windows
            generator: "Visual Studio 17 2022"
            cmake-arch: "-A x64"
            artifact: windows-x64
            bin-path: build/bin/Release/*.dll
            lib-path: build/lib/Release/CesiumNativeC.*
            skip-tests: false

          - os: windows-2022
            arch: arm64
            triplet: arm64-windows
            generator: "Visual Studio 17 2022"
            cmake-arch: "-A ARM64"
            artifact: windows-arm64
            bin-path: build/bin/Release/*.dll
            lib-path: build/lib/Release/CesiumNativeC.*
            skip-tests: true  # cross-compiled, can't run on x64

          # - os: ubuntu-latest
          #   arch: x64
          #   triplet: x64-linux
          #   generator: Ninja
          #   cmake-arch: ""
          #   artifact: linux-x64
          #   bin-path: build/bin/
          #   lib-path: build/lib/libCesiumNativeC.*
          #   skip-tests: false

          # - os: ubuntu-24.04-arm
          #   arch: arm64
          #   triplet: arm64-linux
          #   generator: Ninja
          #   cmake-arch: ""
          #   artifact: linux-arm64
          #   bin-path: build/bin/
          #   lib-path: build/lib/libCesiumNativeC.*
          #   skip-tests: false

          - os: macos-14
            arch: arm64
            triplet: arm64-osx
            generator: Ninja
            cmake-arch: ""
            artifact: osx-arm64
            bin-path: build/bin/
            lib-path: build/lib/libCesiumNativeC.*
            skip-tests: false

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.artifact }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # ---- Install platform tools ----

      - name: Install tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build nasm pkg-config mono-complete

      - name: Install tools (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja nasm mono

      # ---- vcpkg ----

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 62159a45e18f3a9ac0548628dcaf74fcb60c6ff9

      # ---- vcpkg binary cache (GitHub Packages NuGet feed) ----
      # The cache is writable only on main (to warm it); every other ref reads
      # it but never writes, so PRs can't evict shared entries. If VCPKG_PAT_TOKEN
      # (a PAT with packages:read/write) is configured it is preferred, otherwise
      # the built-in GITHUB_TOKEN is used.

      - name: Set up NuGet binary cache (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          NUGET_TOKEN: ${{ secrets.VCPKG_PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          $mode = if ($env:GITHUB_REF -eq 'refs/heads/main') { 'readwrite' } else { 'read' }
          "VCPKG_BINARY_SOURCES=clear;nuget,$($env:NUGET_FEED_URL),$mode" | Out-File -FilePath $env:GITHUB_ENV -Append
          $fetchOut = & "$env:VCPKG_ROOT/vcpkg.exe" fetch nuget
          Write-Host "vcpkg fetch nuget output:`n$($fetchOut -join "`n")"
          $nuget = ($fetchOut | Select-String -Pattern 'nuget\.exe' | Select-Object -Last 1).Line.Trim()
          if (-not $nuget) { throw "Could not resolve nuget.exe path from 'vcpkg fetch nuget'." }
          Write-Host "Resolved nuget.exe: $nuget"
          & $nuget sources add -Source "$env:NUGET_FEED_URL" -StorePasswordInClearText -Name GitHubPackages -UserName "$env:GITHUB_REPOSITORY_OWNER" -Password "$env:NUGET_TOKEN"
          & $nuget setapikey "$env:NUGET_TOKEN" -Source "$env:NUGET_FEED_URL"

      - name: Set up NuGet binary cache (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          NUGET_TOKEN: ${{ secrets.VCPKG_PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then mode=readwrite; else mode=read; fi
          echo "VCPKG_BINARY_SOURCES=clear;nuget,${NUGET_FEED_URL},${mode}" >> "$GITHUB_ENV"
          fetch_out="$("$VCPKG_ROOT/vcpkg" fetch nuget)"
          echo "vcpkg fetch nuget output:"
          echo "$fetch_out"
          nuget_exe="$(printf '%s\n' "$fetch_out" | grep -i 'nuget\.exe' | tail -n 1)"
          if [ -z "$nuget_exe" ]; then echo "Could not resolve nuget.exe path from 'vcpkg fetch nuget'." >&2; exit 1; fi
          echo "Resolved nuget.exe: $nuget_exe"
          mono "$nuget_exe" sources add -Source "$NUGET_FEED_URL" -StorePasswordInClearText -Name GitHubPackages -UserName "$GITHUB_REPOSITORY_OWNER" -Password "$NUGET_TOKEN"
          mono "$nuget_exe" setapikey "$NUGET_TOKEN" -Source "$NUGET_FEED_URL"

      # ---- Build ----

      - name: CMake configure
        run: >
          cmake -S . -B build
          -G "${{ matrix.generator }}" ${{ matrix.cmake-arch }}
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
          -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}

      - name: CMake build
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --parallel

      # ---- Test ----

      - name: Run tests
        if: ${{ !matrix.skip-tests }}
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --target CesiumNativeCTests --parallel && ctest --test-dir build --build-config ${{ env.CMAKE_BUILD_TYPE }} --output-on-failure --no-tests=error
        env:
          # Offline tests only in CI — no Ion token
          CESIUM_ION_TOKEN: ""

      # ---- Upload ----

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CesiumNativeC-${{ matrix.artifact }}
          path: |
            ${{ matrix.bin-path }}
            ${{ matrix.lib-path }}
          if-no-files-found: error
